<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le mie mappe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f2ed;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 60px 40px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #888;
      font-weight: 300;
      margin-bottom: 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 900px;
    }

    a.card {
      display: block;
      background: #fff;
      border: 1px solid #e0dbd4;
      border-radius: 8px;
      padding: 28px 32px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    .card-arrow {
      font-size: 1.2rem;
      color: #bbb;
      margin-top: 16px;
      display: block;
    }
  </style>
</head>
<body>

  <h1>Le mie mappe</h1>
  <p class="subtitle">Progetti e note visualizzate con Markmap</p>

  <div class="grid">

    <a class="card" href="anodizzazione.html">
      <div class="card-title">Anodizzazione</div>
      <span class="card-arrow">→</span>
    </a>

    <!-- Aggiungi altre card qui -->

  </div>

</body>
</html>
